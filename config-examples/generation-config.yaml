# Generation pipeline config (TrainDataGeneration.py)

timeout: 300
parallel_questions: 1 # Number of concurrent questions sent to inference API

prompts: prompts/prompts_blindguard.json # Prompt template file (JSON) used by agents, see example in ./prompts

dataset_tag: MMLUPRO # Dataset selection (must match a class TAG in DatasetManager.py)
questions_random_seed: 158 # Seed for question selection
verbose: false

# Output
save_data_dir: data # Directory to save generated data
file_name: train_debug.pkl # Name of data file (must be .pkl)

# Optional post-processing
process_text: true          # Turn text output in embeddings with TextProcessingManager.RoundProcessor
clean_data: true            # Drop debates with empty/invalid agent outputs (suggested to leave as true)
text_process_workers: 0     # 0 = auto; GPU processors will be forced to sequential
text_processor_class_name: WindowEmbeddings
text_processor_path: TextProcessingManager.py

# Debate parameters
# Debate parameters
debate_config:
  num_agents: 3
  num_malicious: 0
  max_rounds: 3
  consensus_threshold: 1.0
  malicious_randomization_seed: 32

  # Question counts per topology
  n_questions: 2
  n_questions_random_topo: 2

  # Random topology generation
  random_topo_seed: 202
  density: 
    min: 0.4
    max: 0.8
