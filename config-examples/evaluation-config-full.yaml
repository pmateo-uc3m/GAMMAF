# Main evaluation config (MainEvaluation.py)
models_directory: defense-models # Directory that contains all the defense models that are going to be benchmarked
output_file: test-gpt-oss-big.json # json file where the evaluation results will be saved

# One config section per defense model file in models_directory (file stem must match)
defense_model_train_configs:
  BlindGuard:
    pkl_train: data/test_data.pkl # Path to the pkl with the training data
    seed: 42
    device: cpu # Device for model training
    # Data perturbation (used to simulate anomalies in training)
    anomaly_rate: 0.2
    anomaly_scale: 0.5
    anomalize_data: true
    no_balance: false # Set to true to disable class balancing before training

    # Training hyperparameters (required)
    input_dim: 1152
    hidden_dim: 256
    emb_dim: 128
    batch_size: 256
    val_split: 0.2
    num_epochs: 20
    temperature: 0.07
    learning_rate: 0.001
    weight_decay: 0.0001
    scheduler_t_max: 20

    topologies: null

  XG-Guard:
    pkl_train: data/train-gpt-oss-300.pkl
    seed: 42
    device: cpu

    # Training hyperparameters (required)
    feat_dim_s: 384
    feat_dim_t: 384
    hidden_dim: 384
    batch_size: 128
    val_split: 0.2
    num_epochs: 30
    learning_rate: 0.001
    weight_decay: 0.0002
    alpha: 0.001
    top_k: 2

    topologies: null

  MyModel:
    data:
      target_topologies: null
      train_pkl_path: data/train-gpt-oss-300.pkl
    kmeans_config:
      random_state: 12
      threshold: 0.8
      max_k: 5
      
      # Following parameters correspond to the uMAP reduction
      n_components: 2
      n_neighbors: 20
      min_dist: 0.1
      umap_metric: cosine

    # Model parameters
    d_model: 384
    intraNode_layers: 3
    intraNode_heads: 8
    interNode_layers: 3
    interNode_heads: 4

    device: cpu

    # Training parameters
    learning_rate: 0.0001
    weight_decay: 0.0001
    scheduler:
      factor: 0.5
      patience: 5
      threshold: 0.0001
    batch_size: 16
    temperature: 0.15
    node_weight: 1
    graph_weight: 0.5
    global_weight: 0.2

    epochs: 50
    early_stop: 10
    improve_threshold: 0.001
    save_path: best_model.pt

  

live_evaluation_config:
  timeout: 40 # Added a default value
  prompts_file: prompts/prompts_blindguard.json # Added a path

  # Question loader
  questions_path: DatasetManager.py
  questions_dataset_tag: MMLUPRO
  questions_random_seed: 28

  # Debate + attacker settings
  num_agents: 8
  num_malicious_agents: 2
  malicious_seed: 12
  max_rounds: 3
  consensus_threshold: 1.0
  no_consensus_check: false 
  check_consensus_only_unflagged: true

  # Defense settings
  no_defense_baseline: false

  # Concurrency
  max_concurrent_inference: 100 # Added a default value

  # Questions
  num_questions: 0 
  new_random_each_question: true 
  n_questions_on_random_topo: 150
  topologies_seed: 21
  density_range_for_random_topo: [0.5, 0.9]

  # Text processor
  text_processor_path: TextProcessingManager.py 
  text_processor_class_name: WindowEmbeddings 

  # Debug artifacts
  save_traces: false 
  clean_debates_with_empty_responses: true