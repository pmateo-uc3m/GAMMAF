# Main evaluation config (MainEvaluation.py)
models_directory: defense-models # Directory that contains all the defense models that are going to be benchmarked
output_file: test.json # json file where the evaluation results will be saved

# One config section per defense model file in models_directory (file stem must match)
defense_model_train_configs:
  BlindGuard:
    pkl_train: data/test_data.pkl # Path to the pkl with the training data
    seed: 42
    device: cpu # Device for model training
    # Data perturbation (used to simulate anomalies in training)
    anomaly_rate: 0.2
    anomaly_scale: 0.5
    anomalize_data: true
    no_balance: false # Set to true to disable class balancing before training

    # Training hyperparameters (required)
    input_dim: 1152
    hidden_dim: 256
    emb_dim: 128
    batch_size: 256
    val_split: 0.2
    num_epochs: 20
    temperature: 0.07
    learning_rate: 0.001
    weight_decay: 0.0001
    scheduler_t_max: 20

    topologies: null

  XG-Guard:
    pkl_train: data/test_data.pkl
    seed: 42
    device: cpu

    # Training hyperparameters (required)
    feat_dim_s: 384
    feat_dim_t: 384
    hidden_dim: 256
    batch_size: 8
    val_split: 0.2
    num_epochs: 5
    learning_rate: 0.001
    weight_decay: 0.0001
    alpha: 0.5

    topologies: null

live_evaluation_config:
  timeout: 20 # Added a default value
  prompts_file: prompts/prompts_blindguard.json # Added a path

  # Question loader
  questions_path: DatasetManager.py
  questions_dataset_tag: MMLU
  questions_random_seed: 28

  # Debate + attacker settings
  num_agents: 5
  num_malicious_agents: 2
  malicious_seed: 123
  max_rounds: 3
  consensus_threshold: 1.0
  no_consensus_check: false 
  check_consensus_only_unflagged: true

  # Defense settings
  top_k_defense: 2 
  no_defense_baseline: false

  # Concurrency
  max_concurrent_inference: 10 # Added a default value

  # Questions
  num_questions: 20 
  new_random_each_question: true 
  n_questions_on_random_topo: 20 
  topologies_seed: 24
  density_range_for_random_topo: [0.3, 0.7]

  # Text processor
  text_processor_path: TextProcessingManager.py 
  text_processor_class_name: RoundProcessor 

  # Debug artifacts
  save_traces: false 
  clean_debates_with_empty_responses: true