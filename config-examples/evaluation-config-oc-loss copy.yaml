# Main evaluation config (MainEvaluation.py)
models_directory: defense-models # Directory that contains all the defense models that are going to be benchmarked
output_file: results/experiment-run-2.json # json file where the evaluation results will be saved

# One config section per defense model file in models_directory (file stem must match)
defense_model_train_configs:
  XG-Guard:
    pkl_train: data/train-gpt-oss-300.pkl
    seed: 42
    device: cpu

    # Training hyperparameters (required)
    feat_dim_s: 384
    feat_dim_t: 384
    hidden_dim: 384
    batch_size: 128
    val_split: 0.2
    num_epochs: 30
    learning_rate: 0.001
    weight_decay: 0.0002
    alpha: 0.001
    top_k: 2

    topologies: null

  MyModel-v0:
    data:
      target_topologies: null
      train_pkl_path: data/train-gpt-oss-300.pkl

    validation_split: 0.2
    validation_seed: 109230

    kmeans_config:
      random_state: 12
      threshold: 0.8
      max_k: 5
      
      # Following parameters correspond to the uMAP reduction
      n_components: 2
      n_neighbors: 15
      min_dist: 0.1
      umap_metric: cosine

    # Model parameters
    d_model: 384
    intraNode_layers: 3
    intraNode_heads: 4
    interNode_layers: 3
    interNode_heads: 4

    device: cuda

    # Training parameters
    learning_rate: 0.0001
    weight_decay: 0.0001
    scheduler:
      factor: 0.5
      patience: 5
      threshold: 0.00001
    batch_size: 16
    temperature: 0.15
    node_weight: 0.2
    graph_weight: 1
    global_weight: 0.2

    epochs: 100
    early_stop: 15 # epochs without imprevement for early stop
    improve_threshold: 0.001
    save_path: best_model.pt

  MyModel-v1:
    data:
      target_topologies: null
      train_pkl_path: data/train-gpt-oss-300.pkl

    validation_split: 0.2
    validation_seed: 109230

    kmeans_config:
      random_state: 12
      threshold: 0.8
      max_k: 7
      
      # Following parameters correspond to the uMAP reduction
      n_components: 2
      n_neighbors: 15
      min_dist: 0.1
      umap_metric: cosine

    # Model parameters
    d_model: 384
    intraNode_layers: 3
    intraNode_heads: 4
    interNode_layers: 3
    interNode_heads: 4

    device: cuda

    # Training parameters
    learning_rate: 0.0001
    weight_decay: 0.0001
    scheduler:
      factor: 0.5
      patience: 5
      threshold: 0.00001
    batch_size: 16
    temperature: 0.15
    cohesion_weight: 1.0
    neighbor_weight: 0.5
    graph_separation_weight: 0.1
    loss_temperature: 0.5
    huber_delta: 1.0

    epochs: 100
    early_stop: 15 # epochs without imprevement for early stop
    improve_threshold: 0.001
    save_path: best_model_tarc.pt
    model_name: my-model-v1

  

live_evaluation_config:
  timeout: 60 # Added a default value
  prompts_file: prompts/prompts_blindguard.json # Added a path

  # Question loader
  questions_path: DatasetManager.py
  questions_dataset_tag: MMLUPRO
  questions_random_seed: 28324234

  # Debate + attacker settings
  num_agents: 8
  num_malicious_agents: 2
  malicious_seed: 12
  max_rounds: 3
  consensus_threshold: 1.0
  no_consensus_check: false 
  check_consensus_only_unflagged: true

  # Defense settings
  no_defense_baseline: false

  # Concurrency
  max_concurrent_inference: 100 # Added a default value

  # Questions
  num_questions: 0 
  new_random_each_question: true 
  n_questions_on_random_topo: 35
  topologies_seed: 21
  density_range_for_random_topo: [0.6, 0.9]

  # Text processor
  text_processor_path: TextProcessingManager.py 
  text_processor_class_name: WindowEmbeddings 

  # Debug artifacts
  save_traces: false 
  clean_debates_with_empty_responses: true